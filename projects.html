    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        tailwind.config = {
            theme: { extend: {
                colors:{ netbg:'#141414', netcard:'#181818', netred:'#E50914' },

                    sans:['Inter', 'Noto Sans Thai', 'sans-serif'], 
                    heading:['Bebas Neue', 'Noto Sans Thai', 'sans-serif'] 
                }
            }}

    <style>
        *{box-sizing:border-box}
        body{background:#141414;color:#E5E5E5;overflow-x:hidden;padding-bottom:0}
        @media(max-width:767px){body{padding-bottom:70px}}
        ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#141414}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#E50914}
        ::selection{background:#E50914;color:#fff}

        .glass-nav{background:linear-gradient(to bottom,rgba(20,20,20,.96),rgba(20,20,20,.75));backdrop-filter:blur(12px)}

        /* Cursor glow */
        #cursor-glow{position:fixed;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(229,9,20,.055) 0%,transparent 65%);pointer-events:none;transform:translate(-50%,-50%);z-index:1;mix-blend-mode:screen;transition:left .07s linear,top .07s linear}

        /* Background grid */
        .page-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(229,9,20,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(229,9,20,.025) 1px,transparent 1px);background-size:64px 64px;animation:gridMove 28s linear infinite;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%)}
        @keyframes gridMove{to{background-position:64px 64px}}

        /* Glitch logo */
        .glitch-nav{position:relative;display:inline-block}
        .glitch-nav::before,.glitch-nav::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;font-family:inherit;font-size:inherit;letter-spacing:inherit;color:inherit;opacity:0;pointer-events:none}
        .glitch-nav:hover::before{color:#00eeff;opacity:.8;animation:ga .3s steps(2) infinite}
        .glitch-nav:hover::after{color:#ff0077;opacity:.7;animation:gb .3s steps(2) infinite}
        @keyframes ga{0%{clip-path:inset(0 0 90% 0);transform:translateX(-5px)}33%{clip-path:inset(35% 0 45% 0);transform:translateX(5px)}66%{clip-path:inset(70% 0 15% 0);transform:translateX(-4px)}100%{clip-path:inset(15% 0 70% 0);transform:translateX(4px)}}
        @keyframes gb{0%{clip-path:inset(75% 0 10% 0);transform:translateX(5px)}33%{clip-path:inset(10% 0 70% 0);transform:translateX(-5px)}66%{clip-path:inset(50% 0 30% 0);transform:translateX(4px)}100%{clip-path:inset(5% 0 85% 0);transform:translateX(-4px)}}

        /* Nav link */
        .nav-link{position:relative}
        .nav-link::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:#E50914;transition:width .3s ease}
        .nav-link:hover::after,.nav-link.active-page::after{width:100%}

        /* ── Project Card ── */
        .project-card{
            display:block;position:relative;background:#181818;
            border:1px solid #262626;border-radius:16px;overflow:hidden;
            text-decoration:none;color:inherit;cursor:pointer;
            transition:transform .45s cubic-bezier(.16,1,.3,1),border-color .4s ease,box-shadow .4s ease;
            transform-style:preserve-3d;will-change:transform;
        }
        .project-card[data-accent="blue"]:hover  {border-color:rgba(59,130,246,.45);box-shadow:0 30px 80px rgba(59,130,246,.12),0 0 0 1px rgba(59,130,246,.15)}
        .project-card[data-accent="yellow"]:hover {border-color:rgba(234,179,8,.45);box-shadow:0 30px 80px rgba(234,179,8,.12),0 0 0 1px rgba(234,179,8,.15)}
        .project-card[data-accent="green"]:hover  {border-color:rgba(34,197,94,.45);box-shadow:0 30px 80px rgba(34,197,94,.12),0 0 0 1px rgba(34,197,94,.15)}

        .card-shine{position:absolute;inset:0;pointer-events:none;z-index:5;border-radius:inherit;background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.05) 0%,transparent 55%);opacity:0;transition:opacity .3s ease}
        .project-card:hover .card-shine{opacity:1}

        .icon-zone{position:relative;display:flex;align-items:center;justify-content:center;height:200px;overflow:hidden}
        .icon-zone-bg{position:absolute;inset:0;transition:opacity .4s ease}
        .project-card:hover .icon-zone-bg{opacity:.7}

        .ring{position:absolute;border-radius:50%;border:1px solid transparent;transition:transform .6s ease,opacity .4s ease}
        .project-card:hover .ring{opacity:.55}
        .project-card:hover .ring-1{transform:scale(1.15)}
        .project-card:hover .ring-2{transform:scale(1.1)}

        .icon-box{position:relative;z-index:2;width:88px;height:88px;border-radius:20px;display:flex;align-items:center;justify-content:center;transition:transform .45s cubic-bezier(.16,1,.3,1),box-shadow .4s ease}
        .project-card:hover .icon-box{transform:scale(1.14) translateY(-4px)}

        .content-zone{padding:20px 22px 22px;border-top:1px solid #222}
        .stat-chip{display:inline-block;padding:3px 9px;background:rgba(255,255,255,.04);border:1px solid #2a2a2a;border-radius:4px;font-size:11px;color:#888;font-weight:600;letter-spacing:.04em}
        .tag-chip{display:inline-block;padding:2px 8px;background:transparent;border:1px solid #2a2a2a;border-radius:20px;font-size:10px;color:#555;font-weight:500;letter-spacing:.04em}

        .cta-row{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;transition:gap .3s ease}
        .project-card:hover .cta-row{gap:14px}
        .cta-arrow-icon{transition:transform .3s ease}
        .project-card:hover .cta-arrow-icon{transform:translateX(4px)}

        @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
        .fade-up-1{animation:fadeUp .8s cubic-bezier(.16,1,.3,1) 0s both}
        .fade-up-2{animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .12s both}
        .fade-up-3{animation:fadeUp .8s cubic-bezier(.16,1,.3,1) .24s both}

        .bottom-nav-link.active i{color:#E50914;transform:scale(1.1)}
        .bottom-nav-link.active span{color:#fff}

        @keyframes countPulse{0%,100%{box-shadow:0 0 0 0 rgba(229,9,20,.4)}50%{box-shadow:0 0 0 6px rgba(229,9,20,0)}}
        .count-badge{animation:countPulse 2.5s ease-in-out infinite}

        /* ════════ MODAL ════════ */
        #proj-modal{
            position:fixed;inset:0;z-index:500;
            pointer-events:none;visibility:hidden;
        }
        #proj-modal.open{pointer-events:all;visibility:visible}

        /* Backdrop */
        #modal-bg{
            position:absolute;inset:0;
            background:rgba(0,0,0,.75);
            backdrop-filter:blur(8px);
            -webkit-backdrop-filter:blur(8px);
            opacity:0;
            transition:opacity .4s ease;
        }
        #proj-modal.open #modal-bg{opacity:1}

        /* Centered popup panel */
        #modal-panel{
            position:absolute;
            top:50%;left:50%;
            width:92%;max-width:900px;
            max-height:85vh;
            background:#141414;
            display:flex;flex-direction:column;
            overflow:hidden;
            transform:translate(-50%,-50%) scale(0.95);
            opacity:0;
            transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s ease;
            border-radius:20px;
            border:1px solid #262626;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #proj-modal.open #modal-panel{
            transform:translate(-50%,-50%) scale(1);
            opacity:1;
        }

        /* Modal topbar */
        #modal-topbar{
            position:relative;flex-shrink:0;
            display:flex;align-items:center;justify-content:space-between;
            padding:14px 18px;
            border-bottom:1px solid #222;
            background:#141414;
            z-index:10;
        }
        /* Read progress bar */
        #modal-progress{
            position:absolute;bottom:0;left:0;
            height:2px;width:0%;
            transition:width .1s linear;
        }

        /* Modal scrollable body */
        #modal-body{overflow-y:auto;flex:1;overscroll-behavior:contain}

        /* Modal content stagger */
        .m-item{
            opacity:0;transform:translateY(22px);
            transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);
        }
        .m-item.visible{opacity:1;transform:translateY(0)}

        /* Close button */
        #modal-close{
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,.06);border:1px solid #333;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;transition:background .2s,transform .2s;
            color:#aaa;font-size:16px;
        }
        #modal-close:hover{background:rgba(255,255,255,.12);transform:rotate(90deg);color:#fff}

        /* Image placeholder */
        .img-ph{
            background:#0d0d0d;border:2px dashed #262626;border-radius:10px;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            gap:8px;color:#3a3a3a;transition:border-color .3s,color .3s;cursor:default;
        }
        .img-ph:hover{border-color:#E50914;color:#E50914}

        /* Stat shimmer */
        @keyframes shimmer{from{transform:translateX(-120%) skewX(-20deg)}to{transform:translateX(320%) skewX(-20deg)}}
        .s-shine{position:relative;overflow:hidden}
        .s-shine::after{content:'';position:absolute;top:0;left:0;width:28%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:shimmer 4s ease-in-out infinite;pointer-events:none}

        /* Tool badge */
        .tool-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:4px;border:1px solid rgba(229,9,20,.25);background:rgba(229,9,20,.06);color:#bbb;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}
        .tool-badge:hover{border-color:rgba(229,9,20,.6);color:#fff;background:rgba(229,9,20,.12)}

        /* Modal icon rings */
        @keyframes rp{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
        .ring-anim{animation:rp 3s ease-in-out infinite}
        @keyframes rp2{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.4;transform:scale(1.08)}}
        .ring-anim-2{animation:rp2 3s ease-in-out 1.2s infinite}

        /* Proj nav btns */
        .proj-nav-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;background:#181818;border:1px solid #262626;border-radius:10px;transition:border-color .25s,background .25s,transform .2s;text-decoration:none;color:#ccc;font-size:13px;font-weight:600;cursor:pointer}
        .proj-nav-btn:hover{border-color:rgba(229,9,20,.35);background:#1e1e1e;transform:translateY(-2px)}
    </style>
</head>

    currentLang = currentLang === 'en' ? 'th' : 'en';
    localStorage.setItem('siteLang', currentLang);
    updateLanguageUI(false);
}

function updateLanguageUI(isFirstRender = false) {
    // 1. Update Lang buttons text
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.textContent = currentLang === 'en' ? 'TH' : 'EN';
    });
    
    // 2. Update static HTML translations
    document.querySelectorAll('[data-en]').forEach(el => {
        el.innerHTML = el.getAttribute(`data-${currentLang}`);
    });
    
    // 3. Re-render cards
    renderCards(isFirstRender);
    
    // 4. Update modal text if it's currently open
    if (currentId && document.getElementById('proj-modal').classList.contains('open')) {
        const p = PROJECTS[currentId];
        document.getElementById('modal-bc-title').textContent = p[currentLang].title;
        document.getElementById('modal-content').innerHTML = buildContent(p);
        document.querySelectorAll('.m-item').forEach(el => el.classList.add('visible')); // Force show instantly
    }
}

// ════════════════════════════════
// RENDER CARDS
// ════════════════════════════════
function renderCards(isFirstRender) {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = Object.values(PROJECTS).map((p, i) => {
        const data = p[currentLang];
        // Style animation for first render only
        const animStyle = isFirstRender ? `opacity:0; transform:translateY(55px) scale(.95); transition: opacity .75s cubic-bezier(.16,1,.3,1) ${150 + i * 110}ms, transform .75s cubic-bezier(.16,1,.3,1) ${150 + i * 110}ms;` : '';
        const initClass = isFirstRender ? 'card-anim-init' : '';
        
        return `
        <div class="project-card ${initClass}" style="${animStyle}" data-accent="${p.accentName}" onclick="openProject('${p.id}')">
            <div class="card-shine"></div>
            <div class="icon-zone" style="background:linear-gradient(160deg,rgba(${p.accentRgb},.08) 0%,transparent 100%)">
                <div class="icon-zone-bg" style="background:radial-gradient(circle at 50% 60%,rgba(${p.accentRgb},.12),transparent 70%)"></div>
                <div class="ring ring-1" style="width:160px;height:160px;border-color:rgba(${p.accentRgb},.08)"></div>
                <div class="ring ring-2" style="width:110px;height:110px;border-color:rgba(${p.accentRgb},.12)"></div>
                <div class="icon-box" style="background:rgba(${p.accentRgb},.1);border:1px solid rgba(${p.accentRgb},.2)">
                    <i class="${p.icon}" style="font-size:2.6rem;color:${p.accentLight}"></i>
                </div>
            </div>
            <div class="content-zone">
                <div class="flex items-start justify-between mb-3">
                    <span class="font-heading text-5xl leading-none" style="color:rgba(${p.accentRgb},.15)">${p.number}</span>
                    <span class="inline-flex items-center gap-1 px-2 py-1 rounded-sm text-[9px] font-bold tracking-widest uppercase" style="background:rgba(${p.accentRgb},.1);border:1px solid rgba(${p.accentRgb},.25);color:${p.accentLight}">
                        <i class="${data.badgeIcon}" style="font-size:8px"></i> ${data.badgeLabel}
                    </span>
                </div>
                <h3 class="font-heading text-[1.7rem] md:text-[2rem] leading-tight text-white mb-1">${data.title}</h3>
                <p class="text-gray-500 text-xs mb-4">${data.sub}</p>
                <div class="flex flex-wrap gap-1.5 mb-3">
                    ${data.stats.map(s => `<span class="stat-chip">${s.v} ${s.l}</span>`).join('')}
                </div>
                <div class="flex flex-wrap gap-1.5 mb-5">
                    ${data.tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                </div>
                <div class="cta-row" style="color:${p.accentLight}">
                    <span>${data.exploreLabel}</span>
                    <i class="fas fa-arrow-right cta-arrow-icon" style="font-size:11px"></i>
                </div>
            </div>
        </div>`;
    }).join('');

    bindCardEvents();

    if (isFirstRender) {
        // Trigger animations
        setTimeout(() => {
            document.querySelectorAll('.card-anim-init').forEach(el => {
                el.style.opacity = '1';
                el.style.transform = 'translateY(0) scale(1)';
                setTimeout(() => { el.style.transition=''; el.style.transform=''; el.classList.remove('card-anim-init'); }, 1000);
            });
        }, 50);
    }
}

// ════════════════════════════════
// OPEN / CLOSE MODAL
// ════════════════════════════════
function openProject(id) {
    currentId = id;
    const p = PROJECTS[id];
    if (!p) return;

    document.getElementById('modal-bc-title').textContent = p[currentLang].title;
    document.getElementById('modal-progress').style.background = `linear-gradient(90deg, ${p.accent}, ${p.accentLight})`;
    document.getElementById('modal-progress').style.width = '0%';

    document.getElementById('btn-prev').disabled = !p.prev;
    document.getElementById('btn-next').disabled = !p.next;

    document.getElementById('modal-content').innerHTML = buildContent(p);

    const modal = document.getElementById('proj-modal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    const body = document.getElementById('modal-body');
    body.scrollTop = 0;

    const items = document.querySelectorAll('.m-item');
    items.forEach((el, i) => {
        el.style.transitionDelay = (i * 70) + 'ms';
        setTimeout(() => el.classList.add('visible'), 80 + i * 70);
    });

    body.onscroll = () => {
        const pct = body.scrollTop / (body.scrollHeight - body.clientHeight) * 100;
        document.getElementById('modal-progress').style.width = pct + '%';
    };
}

function closeProject() {
    const modal = document.getElementById('proj-modal');
    modal.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => {
        document.querySelectorAll('.m-item').forEach(el => {
            el.classList.remove('visible');
            el.style.transitionDelay = '0ms';
        });
    }, 500);
}

function navigateProject(dir) {
    const p = PROJECTS[currentId];
    const nextId = dir === -1 ? p.prev : p.next;
    if (!nextId) return;

    const content = document.getElementById('modal-content');
    const body = document.getElementById('modal-body');
    content.style.transition = 'opacity .2s ease, transform .2s ease';
    content.style.opacity = '0';
    content.style.transform = `translateX(${dir > 0 ? '-30px' : '30px'})`;

    setTimeout(() => {
        currentId = nextId;
        const np = PROJECTS[nextId];
        document.getElementById('modal-bc-title').textContent = np[currentLang].title;
        document.getElementById('modal-progress').style.background = `linear-gradient(90deg, ${np.accent}, ${np.accentLight})`;
        document.getElementById('btn-prev').disabled = !np.prev;
        document.getElementById('btn-next').disabled = !np.next;
        document.getElementById('modal-content').innerHTML = buildContent(np);

        body.scrollTop = 0;

        content.style.transform = `translateX(${dir > 0 ? '30px' : '-30px'})`;
        content.style.opacity = '0';
        requestAnimationFrame(() => {
            content.style.transition = 'opacity .35s ease, transform .35s ease';
            content.style.opacity = '1';
            content.style.transform = 'translateX(0)';
        });

        const items = document.querySelectorAll('.m-item');
        items.forEach((el, i) => {
            el.style.transitionDelay = (i * 60) + 'ms';
            setTimeout(() => el.classList.add('visible'), 60 + i * 60);
        });

        body.onscroll = () => {
            const pct = body.scrollTop / (body.scrollHeight - body.clientHeight) * 100;
            document.getElementById('modal-progress').style.width = pct + '%';
        };
    }, 200);
}

// ════════════════════════════════
// BUILD HTML FOR MODAL
// ════════════════════════════════
function buildContent(p) {
    const data = p[currentLang];

    const statsH = data.stats.map(s => `
        <div class="s-shine bg-black/40 border border-gray-800 rounded-lg p-3 md:p-4">
            <div class="font-heading text-xl md:text-2xl leading-tight" style="color:${p.accentLight}">${s.v}</div>
            <div class="text-[11px] text-gray-400 uppercase mt-1 leading-tight">${s.l}</div>
        </div>`).join('');

    const tagsH = data.tags.map(t => `<span class="px-2.5 py-1 bg-white/[.04] border border-gray-800 rounded-full text-gray-400 text-xs">${t}</span>`).join('');

    const secH = data.sections.map(s => `
        <div class="m-item">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md mb-3 bg-white/[.03] border border-gray-800">
                <i class="${s.icon} text-gray-400 text-xs"></i>
                <span class="text-gray-300 font-bold tracking-widest uppercase text-xs">${s.label}</span>
            </div>
            <ul class="space-y-2.5">
                ${s.items.map(item => `
                    <li class="flex items-start gap-2 text-sm text-gray-400 leading-relaxed">
                        <i class="fas fa-play text-netred text-[9px] mt-1.5 shrink-0" style="color:#E50914"></i>
                        <span>${item}</span>
                    </li>`).join('')}
            </ul>
        </div>`).join('');

    const skillsH = p.skills.length ? `
        <div class="m-item bg-black/30 border border-gray-800 rounded-xl p-4 mt-4">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold mb-2">${data.skillsLabel}</p>
            <div class="flex flex-wrap gap-1.5">
                ${p.skills.map(s => `<span class="px-2.5 py-1 bg-white/[.04] border border-gray-700 rounded text-gray-400 text-xs">${s}</span>`).join('')}
            </div>
        </div>` : '';

    const toolsH = p.tools.map(t => `<span class="tool-badge"><i class="${t.i} text-[10px]"></i>${t.l}</span>`).join('');

    const prevBtn = p.prev
        ? `<button onclick="navigateProject(-1)" class="proj-nav-btn"><i class="fas fa-arrow-left text-xs" style="color:${p.accent}"></i><div><div class="text-[9px] text-gray-500 uppercase tracking-widest leading-none mb-0.5">${data.prevLabel}</div><div>${data.projLabel} ${PROJECTS[p.prev].number}</div></div></button>`
        : `<div></div>`;
    const nextBtn = p.next
        ? `<button onclick="navigateProject(+1)" class="proj-nav-btn flex-row-reverse ml-auto"><i class="fas fa-arrow-right text-xs" style="color:${p.accent}"></i><div class="text-right"><div class="text-[9px] text-gray-500 uppercase tracking-widest leading-none mb-0.5">${data.nextLabel}</div><div>${data.projLabel} ${PROJECTS[p.next].number}</div></div></button>`
        : `<div></div>`;

    return `
    <div class="m-item relative overflow-hidden rounded-xl mb-5 mt-4" style="background:linear-gradient(160deg,rgba(${p.accentRgb},.1) 0%,rgba(20,20,20,0) 60%)">
        <div class="p-5 md:p-7 flex flex-col md:flex-row md:items-center gap-6">
            <div class="relative shrink-0 flex items-center justify-center" style="width:120px;height:120px">
                <div class="absolute w-28 h-28 rounded-full ring-anim" style="border:1px solid rgba(${p.accentRgb},.12)"></div>
                <div class="absolute w-20 h-20 rounded-full ring-anim-2" style="border:1px solid rgba(${p.accentRgb},.18)"></div>
                <div class="relative z-10 w-16 h-16 rounded-2xl flex items-center justify-center" style="background:rgba(${p.accentRgb},.12);border:1px solid rgba(${p.accentRgb},.25)">
                    <i class="${p.icon} text-3xl" style="color:${p.accentLight}"></i>
                </div>
            </div>
            <div class="flex-1 min-w-0">
                <div class="flex flex-wrap gap-2 mb-2">
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-sm text-[10px] font-bold tracking-widest uppercase" style="background:rgba(${p.accentRgb},.1);border:1px solid rgba(${p.accentRgb},.3);color:${p.accentLight}">
                        <i class="${data.badgeIcon}" style="font-size:9px"></i>${data.badgeLabel}
                    </span>
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-sm text-[10px] font-bold tracking-widest uppercase bg-white/[.04] border border-gray-700 text-gray-400">
                        <i class="${data.locIcon}" style="font-size:9px"></i>${data.locLabel}
                    </span>
                </div>
                <h2 class="font-heading text-3xl md:text-5xl text-white leading-tight mb-1">${data.title}</h2>
                <p class="text-gray-500 text-xs md:text-sm mb-3">${data.sub}</p>
                <p class="text-sm italic" style="color:rgba(${p.accentRgb},.65)">"${data.tagline}"</p>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2 px-5 md:px-7 pb-5 md:pb-7">${statsH}</div>
    </div>

    <div class="m-item flex flex-wrap gap-1.5 mb-5">${tagsH}</div>

    <div class="m-item bg-netcard border border-gray-800 rounded-xl p-5 md:p-6 mb-5">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-md mb-3" style="background:rgba(${p.accentRgb},.08);border:1px solid rgba(${p.accentRgb},.2)">
            <i class="fas fa-sparkles text-xs" style="color:${p.accentLight}"></i>
            <span class="font-bold tracking-widest uppercase text-xs" style="color:${p.accentLight}">${data.overviewLabel}</span>
        </div>
        <p class="text-gray-400 text-sm md:text-base leading-relaxed">${data.overview}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-5">${secH}</div>

    <div class="m-item mb-5">
        ${p.imgUrl 
            ? `<img src="${p.imgUrl}" alt="${data.title}" class="w-full h-auto max-h-[450px] object-cover rounded-xl border border-gray-800 shadow-lg">` 
            : `<div class="img-ph w-full h-44 md:h-56 rounded-xl relative">
                 <i class="${data.imgIcon} text-3xl mb-1"></i>
                 <span class="text-sm font-semibold">${data.imgCaption}</span>
                 <span class="text-xs text-center px-4" style="color:#2a2a2a">${data.imgSub}</span>
               </div>`
        }
    </div>

    <div class="m-item mb-5 rounded-xl p-4 md:p-5" style="background:rgba(${p.accentRgb},.06);border:1px solid rgba(${p.accentRgb},.2);border-left:3px solid ${p.accent}">
        <p class="text-sm text-gray-200 leading-relaxed">
            <i class="fas fa-lightbulb mr-2" style="color:${p.accentLight}"></i>
            <strong style="color:${p.accentLight}">${data.findingLabel}:</strong> ${data.finding}
        </p>
    </div>

    ${skillsH}

    <div class="m-item flex flex-wrap gap-2 items-center pt-4 border-t border-gray-800 mb-6">
        <span class="text-gray-500 text-[10px] uppercase tracking-widest font-semibold self-center mr-1">${data.toolsLabel}</span>
        ${toolsH}
    </div>

    <div class="m-item flex justify-between gap-3 pt-4 border-t border-gray-800">
        ${prevBtn}
        ${nextBtn}
    </div>`;
}

// ════════════════════════════════
// INIT & EVENTS
// ════════════════════════════════
function bindCardEvents() {
    document.querySelectorAll('.project-card').forEach(card => {
        let raf;
        card.addEventListener('mousemove', e => {
            cancelAnimationFrame(raf);
            raf = requestAnimationFrame(() => {
                const r = card.getBoundingClientRect();
                const x = e.clientX - r.left, y = e.clientY - r.top;
                const tX = ((y - r.height/2) / (r.height/2)) * -7;
                const tY = ((x - r.width /2) / (r.width /2)) * 7;
                card.style.transform = `translateY(-10px) perspective(900px) rotateX(${tX}deg) rotateY(${tY}deg) scale(1.02)`;
                const shine = card.querySelector('.card-shine');
                if (shine) {
                    shine.style.setProperty('--mx', (x/r.width*100)+'%');
                    shine.style.setProperty('--my', (y/r.height*100)+'%');
                }
            });
        });
        card.addEventListener('mouseleave', () => {
            cancelAnimationFrame(raf);
            card.style.transition = 'transform .55s cubic-bezier(.16,1,.3,1),border-color .4s ease,box-shadow .4s ease';
            card.style.transform = '';
            setTimeout(() => card.style.transition='', 560);
        });
        card.addEventListener('mousedown', () => { card.style.transform = 'scale(.97)'; });
    });
}

(function(){
    // First load
    updateLanguageUI(true);

    // Cursor glow
    const glow = document.createElement('div');
    glow.id = 'cursor-glow';
    document.body.appendChild(glow);
    document.addEventListener('mousemove', e => {
        glow.style.left = e.clientX + 'px';
        glow.style.top  = e.clientY + 'px';
    });

    // Keyboard controls
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeProject();
        if (e.key === 'ArrowLeft'  && currentId) navigateProject(-1);
        if (e.key === 'ArrowRight' && currentId) navigateProject(+1);
    });
})();
</script>
